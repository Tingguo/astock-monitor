name: 连通性诊断（一次性）

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 测各数据源从 GitHub IP 是否可达
        run: |
          python - <<'PY'
          import time, requests, traceback
          UA={"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124.0 Safari/537.36"}
          def t(name, fn):
              s=time.time()
              try:
                  r=fn(); print(f"[OK] {name}: {r}  ({time.time()-s:.1f}s)")
              except Exception as e:
                  print(f"[FAIL] {name}: {type(e).__name__} {str(e)[:80]}  ({time.time()-s:.1f}s)")
          # 1) 东财 clist 单发(顺序,1页)
          def em_clist():
              p={"po":1,"np":1,"fltt":2,"invt":2,"fid":"f3","fs":"m:0 t:6,m:0 t:80,m:1 t:2,m:1 t:23","fields":"f12,f14,f21","pn":1,"pz":5}
              r=requests.get("https://push2.eastmoney.com/api/qt/clist/get",params=p,headers=UA,timeout=15)
              return f"HTTP {r.status_code} total={r.json()['data']['total']}"
          def em_mirror():
              p={"po":1,"np":1,"fltt":2,"invt":2,"fid":"f3","fs":"m:0 t:6,m:0 t:80,m:1 t:2,m:1 t:23","fields":"f12,f14,f21","pn":1,"pz":5}
              r=requests.get("https://1.push2.eastmoney.com/api/qt/clist/get",params=p,headers=UA,timeout=15)
              return f"HTTP {r.status_code} total={r.json()['data']['total']}"
          def em_kline():
              p={"fields1":"f1,f2,f3,f4,f5,f6","fields2":"f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61","ut":"7eea3edcaed734bea9cbfc24409ed989","klt":"101","fqt":"1","secid":"1.600519","beg":"20260101","end":"20500000"}
              r=requests.get("https://push2his.eastmoney.com/api/qt/stock/kline/get",params=p,headers=UA,timeout=15)
              return f"HTTP {r.status_code} bars={len(r.json()['data']['klines'])}"
          def sina_min():
              import akshare as ak
              df=ak.stock_zh_a_minute(symbol="sh600519",period="30",adjust="qfq")
              return f"rows={len(df)}"
          def ths_fund():
              import akshare as ak
              df=ak.stock_fund_flow_individual(symbol="3日排行")
              return f"rows={len(df)}"
          t("东财clist主站", em_clist)
          t("东财clist镜像1.push2", em_mirror)
          t("东财kline日线", em_kline)
          t("新浪30分", sina_min)
          t("同花顺资金", ths_fund)
          PY
